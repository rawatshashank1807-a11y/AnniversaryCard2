<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary Card</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Pacifico', cursive;
    background: linear-gradient(rgba(255,192,203,0.6), rgba(255,182,193,0.6)),
                url('https://i.ibb.co/7Q5q6Q5/flowers-love-bg.jpg');
    background-size: cover;
    background-position: center;
    color:#4b0082;
    text-align:center;
}

.page {
    display:none;
    padding:80px 20px;
    font-size:2em;
    min-height:100vh;
}

.page.active {
    display:block;
}

.next-button {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#6a0dad;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-size:18px;
}

#envelope{
    margin-top:150px;
    cursor:pointer;
}

#envelope span{
    font-size:5em;
}
</style>
</head>

<body>

<audio id="bgMusic" src="Umraan Lameriyan - Juss.mp3" loop></audio>

<div id="envelope">
    <span>💌</span>
    <h2>Click to Open</h2>
</div>

<div class="page"><h1>Happy Anniversary Mera Bachaa 💕❤️</h1></div>
<div class="page"><h2>2 March, 10 PM PDF... Kuch yaad aaya darling 🥹</h2></div>
<div class="page"><h2>Kesa lga PDF se abtk ka safar 🎀</h2></div>
<div class="page"><h2>Thankuuu mere life mai aane ke liye 💝</h2></div>
<div class="page"><h2>Aapse pyaar hona mera best decision 😭🤭</h2></div>
<div class="page"><h2>I love you Mera Bachaa 😚</h2></div>
<div class="page"><h1>Forever Yours – Shashank 💖</h1></div>

<button class="next-button" onclick="nextPage()">Next ➡️</button>

<script>
const pages = document.querySelectorAll('.page');
const envelope = document.getElementById('envelope');
const music = document.getElementById('bgMusic');
const nextBtn = document.querySelector('.next-button');

let currentPage = 0;

// Envelope click
envelope.addEventListener('click', function(){
    envelope.style.display = 'none';
    showPage(0);
    music.play();
});

// Show page with typing effect
function showPage(index){
    pages.forEach(p => p.classList.remove('active'));
    pages[index].classList.add('active');

    const textEl = pages[index].querySelector('h1, h2');
    const fullText = textEl.textContent;
    textEl.textContent = '';

    let i = 0;
    const speed = 40;

    const typing = setInterval(() => {
        textEl.textContent += fullText.charAt(i);
        i++;
        if(i >= fullText.length){
            clearInterval(typing);
        }
    }, speed);
}

// Next button
function nextPage(){
    if(currentPage < pages.length - 1){
        currentPage++;
        showPage(currentPage);
    }

    if(currentPage === pages.length - 1){
        nextBtn.innerText = "The End 💖";
    }
}
</script>

</body>
</html>
