<!DOCTYPE html>
<html>
<head>
<title>Happy Anniversary</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #4a004e;
}

.slide {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

img {
    width: 260px;
    border-radius: 20px;
    margin-top: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

button {
    margin-top: 25px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #6a0572;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #a4508b;
}
</style>

</head>
<body>

<!-- Slide 1 -->
<div class="slide active">
    <h1>💖 Happy Anniversary Mdm Ji 💖</h1>
    <p>You are the most special person in my life 💕</p>
    <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- Slide 2 -->
<div class="slide">
    <img src="IMG-20250304-WA0011.jpg">
    <p>Every moment with you is magical ✨</p>
    <button onclick="nextSlide()">Next ➡</button>
</div>

<!-- Slide 3 -->
<div class="slide">
    <h2>Forever With You ❤️</h2>
    <button onclick="playMusic()">🎵 Play Our Song</button>
</div>

<audio id="music">
    <source src="Umraan Lameriyan - Juss.mp3" type="audio/mpeg">
</audio>

<script>
let current = 0;
let slides = document.querySelectorAll(".slide");

function nextSlide() {
    slides[current].classList.remove("active");
    current++;
    if (current >= slides.length) {
        current = 0;
    }
    slides[current].classList.add("active");
}

function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
