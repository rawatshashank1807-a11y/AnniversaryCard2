<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary Card</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>
body {
    background-image: url('https://i.ibb.co/7Q5q6Q5/flowers-love-bg.jpg');
    background-size: cover;
    background-position: center;
    font-family: 'Pacifico', cursive;
    color: #3d2b7f;
    margin: 0;
    overflow-x: hidden;
}

.page {
    display: none;
    text-align: center;
    padding: 60px 20px;
    font-size: 2em;
}

.page.active {
    display: block;
}

.next-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #6a0dad;
    color: white;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    z-index: 9999;
    transition: transform 0.2s, background-color 0.3s;
}

.next-button:hover {
    transform: scale(1.1);
    background-color: #8b2dd2;
}

#envelope {
    text-align: center;
    margin-top: 120px;
    cursor: pointer;
}

#envelope span {
    font-size: 5em;
}
</style>
</head>

<body>

<audio id="bgMusic" src="Umraan Lameriyan - Juss.mp3" loop></audio>

<div id="envelope">
    <span>✉️</span>
    <h2>Click me!</h2>
</div>

<div class="page"><h1>Happy Anniversary Mera Bachaa 💕❤️</h1></div>
<div class="page"><h2>2 March, 10 PM PDF... Kuch yaad aaya darling 🥹</h2></div>
<div class="page"><h2>Kesa lga PDF se abtk ka safar 🎀</h2></div>
<div class="page"><h2>Thankuuu mere life mai aane ke liye 💝</h2></div>
<div class="page"><h2>Aapse pyaar hona mera best decision 😭🤭</h2></div>
<div class="page"><h2>I love you Mera Bachaa 😚</h2></div>
<div class="page"><h1>Happy Anniversary 👀🎀</h1></div>

<button class="next-button" onclick="nextPage()">Next ➡️</button>

<script>
const pages = document.querySelectorAll('.page');
const envelope = document.getElementById('envelope');
const music = document.getElementById('bgMusic');
const nextBtn = document.querySelector('.next-button');

let currentPage = 0;

// Envelope click
envelope.addEventListener('click', function(){
    envelope.style.display = 'none';
    pages[0].classList.add('active');
    music.play();
    typeText(pages[0]);
});

// Next button
function nextPage() {
    if(currentPage < pages.length - 1){
        pages[currentPage].classList.remove('active');
        currentPage++;
        pages[currentPage].classList.add('active');
        typeText(pages[currentPage]);
    }

    // Last page pe button hide
    if(currentPage === pages.length - 1){
        nextBtn.style.display = "none";
    }
}

// Typing animation
function typeText(page){
    const textEl = page.querySelector('h1, h2');
    const fullText = textEl.innerText;
    textEl.innerText = '';
    let i = 0;
    const speed = 40;

    const timer = setInterval(() => {
        textEl.innerText += fullText.charAt(i);
        i++;
        if(i >= fullText.length) clearInterval(timer);
    }, speed);
}
</script>

</body>
</html>
