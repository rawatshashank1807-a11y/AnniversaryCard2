<!DOCTYPE html>
<html>
<head>
<title>Happy Anniversary</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: 'Segoe UI', cursive;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow-x: hidden;
}

h1 {
    margin-top: 30px;
    font-size: 28px;
    color: #4a004e;
}

.card {
    margin-top: 20px;
}

.card img {
    width: 250px;
    height: auto;
    border-radius: 20px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    background: #6a0572;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #a4508b;
}
</style>

</head>

<body>

<h1>💖 Happy Anniversary Mdm Ji 💖</h1>

<div class="card">
    <img src="IMG-20250304-WA0011.jpg" alt="Love Image">
</div>

<button onclick="playMusic()">💌 Play Our Song</button>

<audio id="music">
    <source src="Umraan Lameriyan - Juss.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
